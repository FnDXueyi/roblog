name: Check Luraph Obfuscation

on:
  push:
    paths:
      - '**.lua'
  pull_request:
    paths:
      - '**.lua'

jobs:
  check-luraph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check Luraph header on .lua files
        run: |
          FAILED=0

          # Ambil file .lua yang berubah
          FILES=$(git diff --name-only HEAD~1 HEAD -- '*.lua' 2>/dev/null || git diff --name-only --diff-filter=d HEAD -- '*.lua')

          if [ -z "$FILES" ]; then
            echo "No .lua files changed, skipping."
            exit 0
          fi

          for file in $FILES; do
            if [ ! -f "$file" ]; then
              continue
            fi

            # Cek apakah ada header Luraph (match lura.ph, version-proof)
            if head -5 "$file" | grep -q "lura.ph"; then
              echo "✅ $file — Luraph obfuscated"
            else
              echo "❌ BLOCKED: $file"
              echo "   → Header Luraph Obfuscator tidak ditemukan!"
              echo "   → Obfuscate dulu pakai https://lura.ph/ sebelum push."
              FAILED=1
            fi
          done

          echo ""
          if [ "$FAILED" -eq 1 ]; then
            echo "========================================="
            echo "🚨 PUSH DITOLAK!"
            echo "   Semua file .lua WAJIB di-obfuscate"
            echo "   pakai Luraph sebelum push ke repo."
            echo "========================================="
            exit 1
          fi

          echo "✅ Semua file .lua sudah di-obfuscate dengan Luraph!"
